# 应用基本配置
spring:
  application:
    # 应用名称，用于服务注册与发现
    name: user-service
  profiles:
    # 当前环境配置
    active: dev
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
  config:
    import:
      # 共享基础设施配置（Redis、MySQL、MyBatis-Plus、Knife4j）
      - optional:nacos:gopair-shared.yml?group=DEFAULT_GROUP&refresh=true
      # 统一日志与可观测性配置
      - optional:nacos:gopair-logging-base.yml?group=DEFAULT_GROUP&refresh=true

  # 邮件配置（user-service 专属，含敏感凭证，不上 Nacos）
  mail:
    host: smtp.qq.com
    port: 587
    username: 811790017@qq.com
    password: wetybfencrwnbccf
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

# MyBatis-Plus 服务专属配置（通用配置由 gopair-shared.yml 提供）
mybatis-plus:
  type-aliases-package: com.gopair.userservice.domain.po

# 业务配置（user-service 专属）
gopair:
  # 邮件发件人
  email:
    from: 811790017@qq.com

  # 验证码配置
  verification-code:
    expire-seconds: 300
    resend-interval-seconds: 60

  # JWT 配置（user-service 负责生成令牌）
  jwt:
    # JWT 密钥，用于签名令牌（与 gateway 保持一致，通过环境变量注入）
    secret: hZ3UDLoIEAiyUChiKDNVaMrXK65vrKY+e/MxxDeu3wdjQgsBsl6/fsPr/kR/fbs0W8/3AGbt515cqMXs/AkdDw==
    # JWT 过期时间，单位：毫秒（默认 24 小时）
    expiration: 86400000
