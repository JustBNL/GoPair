# 应用基本配置
spring:
  application:
    # 应用名称，用于服务注册与发现
    name: user-service
  profiles:
    # 当前环境配置
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import:
      - optional:nacos:gopair-business.yml?group=DEFAULT_GROUP&refresh=true
      - optional:nacos:gopair-logging-base.yml?group=DEFAULT_GROUP&refresh=true

# 仅保留服务特定的MyBatis Plus配置
mybatis-plus:
  # 实体类包路径，用于类型别名
  type-aliases-package: com.gopair.userservice.domain.po

# JWT配置（用户服务需要生成令牌）
gopair:
  jwt:
    # JWT密钥，用于签名和验证令牌（环境变量优先）
    secret: ${JWT_SECRET:hZ3UDLoIEAiyUChiKDNVaMrXK65vrKY+e/MxxDeu3wdjQgsBsl6/fsPr/kR/fbs0W8/3AGbt515cqMXs/AkdDw==}
    # JWT过期时间，单位：毫秒（24小时 = 24 * 60 * 60 * 1000）
    expiration: ${JWT_EXPIRATION:86400000}