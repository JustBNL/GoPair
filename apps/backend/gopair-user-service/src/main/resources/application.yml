# 应用基本配置
spring:
  application:
    # 应用名称，用于服务注册与发现
    name: user-service
  profiles:
    # 当前环境配置
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import:
      - optional:nacos:gopair-platform.yml?group=DEFAULT_GROUP&refresh=true
      - optional:nacos:gopair-business.yml?group=DEFAULT_GROUP&refresh=true

# 仅保留服务特定的MyBatis Plus配置
mybatis-plus:
  # 实体类包路径，用于类型别名
  type-aliases-package: com.gopair.userservice.domain.po

# 应用特定日志配置
logging:
  level:
    com.gopair.userservice: DEBUG
