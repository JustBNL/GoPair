# 集成测试环境配置
# 使用真实 MySQL (gopair_test) + 真实 Redis，@Transactional 保证数据库回滚
spring:
  application:
    name: message-service-test

  config:
    import: "optional:nacos:"

  cloud:
    nacos:
      config:
        enabled: false
      discovery:
        enabled: false

  # RabbitMQ 测试配置（禁用自动启动监听器避免队列不存在错误）
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        auto-startup: false
    virtual-host: /
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

  # 真实 MySQL 测试数据库
  datasource:
    url: jdbc:mysql://localhost:3306/gopair_test?useSSL=false&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
    username: root
    password: 610692
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # MySQL schema 自动初始化
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

  # 禁用 MyBatis-Plus 自动 DDL
  jpa:
    hibernate:
      ddl-auto: none

  # 真实 Redis 测试配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 14
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

server:
  port: 0

# MyBatis-Plus 配置（测试 mapper 目录覆盖生产）
mybatis-plus:
  mapper-locations: classpath*:/test-mapper/**/*.xml
  type-aliases-package: com.gopair.messageservice.domain.po
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

logging:
  level:
    com.gopair.messageservice: INFO
    org.springframework.web: INFO
    org.springframework.test: INFO
    org.springframework.transaction: DEBUG
    org.springframework.jdbc: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

gopair:
  message:
    max-content-length: 2000
    max-websocket-connections: 1000
    history-retention-days: 30
    redis-channel-prefix: "message"
    emoji-max-length: 8
    recall-time-limit-seconds: 120
  rest-template:
    enabled: true
    file-service-url: http://file-relay-service/
