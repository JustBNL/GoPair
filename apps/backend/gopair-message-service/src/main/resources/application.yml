# 应用基本配置
spring:
  application:
    # 应用名称，用于服务注册与发现
    name: message-service
  profiles:
    # 当前环境配置
    active: dev
  config:
    import:
      # 共享基础设施配置（Redis、MySQL、RabbitMQ、MyBatis-Plus、Knife4j）
      - optional:nacos:gopair-shared.yml?group=DEFAULT_GROUP&refresh=true
      # 统一日志与可观测性配置
      - optional:nacos:gopair-logging-base.yml?group=DEFAULT_GROUP&refresh=true

# MyBatis-Plus 服务专属配置（通用配置由 gopair-shared.yml 提供）
mybatis-plus:
  type-aliases-package: com.gopair.messageservice.domain.po

# 业务配置（message-service 专属）
gopair:
  message:
    # 消息最大长度（字符数）
    max-content-length: 2000
    # WebSocket 最大连接数
    max-websocket-connections: 1000
    # 消息历史保留天数
    history-retention-days: 30
    # Redis 消息频道前缀
    redis-channel-prefix: "message"
    # Emoji 消息最大字符长度（兼容多码点 Emoji）
    emoji-max-length: 8
    # 消息撤回时限（秒），默认2分钟
    recall-time-limit-seconds: 120
