# 应用基本配置
spring:
  application:
    # 应用名称，用于服务注册与发现
    name: room-service
  profiles:
    # 当前环境配置
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import:
      # 共享基础设施配置（Redis、MySQL、RabbitMQ、MyBatis-Plus、Knife4j）
      - optional:nacos:gopair-shared.yml?group=DEFAULT_GROUP&refresh=true
      # 统一日志与可观测性配置
      - optional:nacos:gopair-logging-base.yml?group=DEFAULT_GROUP&refresh=true

# MyBatis-Plus 服务专属配置（通用配置由 gopair-shared.yml 提供）
mybatis-plus:
  type-aliases-package: com.gopair.roomservice.domain.po

# 业务配置（room-service 专属）
gopair:
  room:
    # 房间默认最大成员数
    default-max-members: 10
    # 房间默认过期时间（小时）
    default-expire-hours: 24
    # 房间码长度
    code-length: 8
    # Redis 预占参数
    reservation:
      # 加入令牌有效期（秒）
      join-token-ttl-seconds: 30
      # 预占位有效期（秒）
      pending-ttl-seconds: 30
      # 超时清理任务执行间隔（毫秒）
      reaper-interval-ms: 60000
      # 单房间入队限流（每毫秒最多受理数）
      rate-limit-per-ms: 100
    # 密码加密主密钥
    password:
      master-key: ${ROOM_PASSWORD_MASTER_KEY:gopair-local-dev-secret}

  # 定时任务配置
  schedule:
    # 房间清理任务执行间隔（毫秒，默认 15 分钟）
    room-cleanup-interval: 900000

# 业务消息队列交换机与路由配置（room-service 专属）
mq:
  room-join:
    exchange: room.join.exchange
    routing-key: room.join.requested
    queue: room.join.queue
    dlx: room.join.dlx
    dlq: room.join.dlq
  room-leave:
    exchange: room.leave.exchange
    routing-key: room.leave.requested
    queue: room.leave.queue
  user-offline:
    exchange: websocket.topic
    routing-key: system.offline
    queue: user.offline.queue
