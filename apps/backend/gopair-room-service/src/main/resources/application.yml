# 应用基本配置
spring:
  application:
    # 应用名称，用于服务注册与发现
    name: room-service
  profiles:
    # 当前环境配置
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import:
      - optional:nacos:gopair-business.yml?group=DEFAULT_GROUP&refresh=true
      - optional:nacos:gopair-logging-base.yml?group=DEFAULT_GROUP&refresh=true

# 仅保留服务特定的MyBatis Plus配置
mybatis-plus:
  # 实体类包路径，用于类型别名
  type-aliases-package: com.gopair.roomservice.domain.po

# GoPair自定义配置
gopair:
  room:
    # 房间默认最大成员数
    default-max-members: 10
    # 房间默认过期时间（小时）
    default-expire-hours: 24
    # 房间码长度
    code-length: 8
  
  # 定时任务配置
  schedule:
    # 房间清理任务执行间隔（毫秒）
    room-cleanup-interval: 900000  # 15分钟