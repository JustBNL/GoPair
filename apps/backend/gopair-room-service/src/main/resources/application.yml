# 应用基本配置
spring:
  application:
    # 应用名称，用于服务注册与发现
    name: room-service
  profiles:
    # 当前环境配置
    active: dev
  config:
    import:
      # 共享基础设施配置（Redis、MySQL、RabbitMQ、MyBatis-Plus、Knife4j）
      - optional:nacos:gopair-shared.yml?group=DEFAULT_GROUP&refresh=true
      # 统一日志与可观测性配置
      - optional:nacos:gopair-logging-base.yml?group=DEFAULT_GROUP&refresh=true

# MyBatis-Plus 服务专属配置（通用配置由 gopair-shared.yml 提供）
mybatis-plus:
  type-aliases-package: com.gopair.roomservice.domain.po

# 业务配置（room-service 专属）
gopair:
  room:
    # 房间默认最大成员数
    default-max-members: 10
    # 房间默认过期时间（小时）
    default-expire-hours: 24
    # 房间码长度
    code-length: 8
    # Redis 预占参数
    reservation:
      # 加入令牌有效期（秒）
      join-token-ttl-seconds: 30
      # 预占位有效期（秒）
      pending-ttl-seconds: 30
      # 超时清理任务执行间隔（毫秒）
      reaper-interval-ms: 60000
      # 单房间入队限流（每毫秒最多受理数）
      rate-limit-per-ms: 100
    # 密码加密主密钥
    password:
      master-key: gopair-local-dev-secret

  # 定时任务配置
  schedule:
    # 房间清理/归档任务执行间隔（毫秒，默认 5 分钟）
    room-cleanup-interval: 300000
    # 已关闭房间归档阈值（小时），closed_time < now - N 小时后执行归档
    room-archive-threshold-hours: 24

  # RabbitMQ 队列参数配置（TTL 单位：毫秒）
  mq:
    room-join-ttl: 300000      # 5 分钟
    room-leave-ttl: 300000     # 5 分钟

  # RestTemplate 配置（通过 Nacos 服务名调用其他服务）
  rest-template:
    enabled: true
