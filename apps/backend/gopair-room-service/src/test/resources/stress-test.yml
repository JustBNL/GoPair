# 压力测试环境配置
# 依赖真实 Redis 和 RabbitMQ（确保本地已启动）
spring:
  application:
    name: room-service-stress-test

  # 禁用 Nacos 配置中心（测试环境不需要）
  config:
    import: "optional:nacos:"
  cloud:
    nacos:
      config:
        enabled: false
      discovery:
        enabled: false

  # RabbitMQ 配置（启用 MQ 消费者用于端到端测试）
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        # 预设为 1 秒，消费层并发测试时动态调整
        concurrency: 1
        max-concurrency: 10
        prefetch: 10
        auto-startup: true
    virtual-host: /

  # 使用 H2 内存数据库进行测试
  datasource:
    url: jdbc:h2:mem:stressdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # H2 数据库初始化（使用与 application.yml 相同的 schema）
  sql:
    init:
      mode: embedded
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  # Redis 测试配置
  data:
    redis:
      host: localhost
      port: 6379

# 服务器配置
server:
  port: 0

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.gopair.roomservice.domain.po
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# 日志配置（压力测试时减少日志输出以避免影响性能）
logging:
  level:
    com.gopair.roomservice: INFO
    org.springframework.amqp: WARN
    org.springframework.data.redis: WARN
    org.hibernate.SQL: WARN

# 房间配置（测试用较小值便于验证防超卖）
gopair:
  room:
    default-max-members: 5
    default-expire-hours: 1
    code-length: 8
    reservation:
      join-token-ttl-seconds: 30
      pending-ttl-seconds: 30
      join-result-ttl-seconds: 300
      reaper-interval-ms: 60000
      rate-limit-per-ms: 100
    password:
      master-key: test-master-key-for-stress-testing
  schedule:
    room-cleanup-interval: 100000
    message-cleanup-interval: 100000
    message-retain-days: 1

# MQ 消息队列配置
mq:
  room-join:
    exchange: room.join.exchange
    routing-key: room.join.requested
    queue: room.join.queue
    dlx: dl.exchange
    dlq: dl.queue
  room-leave:
    exchange: room.leave.exchange
    routing-key: room.leave.requested
    queue: room.leave.queue
  user-offline:
    exchange: websocket.topic
    routing-key: system.offline
    queue: user.offline.queue
