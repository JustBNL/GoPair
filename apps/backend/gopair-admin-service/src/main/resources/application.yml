server:
  port: 8088

spring:
  profiles:
    # 【排查辅助】明确默认激活 dev profile，减少 IDE 配置依赖
    active: dev
  application:
    name: admin-service
  # 禁用 Spring Cloud Bootstrap，避免加载 Nacos 配置
  cloud:
    config:
      enabled: false
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
  datasource:
    url: jdbc:mysql://localhost:3306/gopair?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: root
    password: 610692
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never
  # 【排查辅助】显式配置 RabbitMQ，避免意外触发自动配置连接 localhost:5672
  # 若 RabbitMQ 未运行，可暂时禁用 auto-configuration：
  #   autoconfigure.exclude: org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        auto-startup: false

gopair:
  admin:
    jwt:
      secret: ${JWT_SECRET:hZ3UDLoIEAiyUChiKDNVaMrXK65vrKY+e/MxxDeu3wdjQgsBsl6/fsPr/kR/fbs0W8/3AGbt515cqMXs/AkdDw==}
      expiration: ${JWT_EXPIRATION:28800000}
  # 禁用 OpenTelemetry（日志导出对管理后台非关键路径）
  otel:
    enabled: false
  # 简化日志配置
  logging:
    enabled: true
  # 【排查辅助】RabbitMQ 基础配置（gopair-common RabbitMQAutoConfiguration 依赖）
  rabbitmq:
    message-persistence-enabled: false
    publisher-confirm-enabled: false
    publisher-returns-enabled: false

mybatis-plus:
  type-aliases-package: com.gopair.adminservice.domain.po
  # 【排查辅助】明确 mapper XML 扫描路径（防御性配置，当前无 XML 时不报错）
  mapper-locations: classpath*:mapper/**/*.xml
