spring:
  application:
    # 应用名称，用于服务注册与发现
    name: gateway-service
  profiles:
    # 当前环境配置
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import:
      - optional:nacos:gopair-platform.yml?group=DEFAULT_GROUP&refresh=true
      - optional:nacos:gopair-gateway.yml?group=DEFAULT_GROUP&refresh=true
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/user/**
          filters:     
            - StripPrefix=0
        - id: room-service
          uri: lb://room-service
          predicates:
            - Path=/room/**
          filters:
            - StripPrefix=0
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

server:
  port: 8081

# 网关特定配置
gopair:
  gateway:
    skip-auth-paths: "/user/login,/user,/doc.html,/swagger-ui.html,/v3/api-docs"

# 网关应用特定日志配置
logging:
  level:
    com.gopair.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG 