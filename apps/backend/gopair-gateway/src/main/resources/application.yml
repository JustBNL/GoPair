# 应用基本配置
spring:
  application:
    # 应用名称，用于服务注册与发现
    name: gateway-service
  profiles:
    # 当前环境配置
    active: dev
  config:
    import:
      # 网关专属配置（Nacos服务发现、JWT验证、skipAuthPaths）
      - optional:nacos:gopair-gateway.yml?group=DEFAULT_GROUP&refresh=true
      # 统一日志与可观测性配置
      - optional:nacos:gopair-logging-base.yml?group=DEFAULT_GROUP&refresh=true

  # 网关路由配置（若 Nacos 不可用则此节为空，路由需手动配置或服务不可达）
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
    gateway:
      # 全局 HTTP 客户端超时配置，防止下游卡死导致线程池耗尽
      httpclient:
        connect-timeout: 5000
        response-timeout: 30s
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/user/**
          filters:
            - StripPrefix=0
        - id: room-service
          uri: lb://room-service
          predicates:
            - Path=/room/**
          filters:
            - StripPrefix=0
        - id: message-service
          uri: lb://message-service
          predicates:
            - Path=/message/**
          filters:
            - StripPrefix=0
        - id: websocket-api-service
          uri: lb://websocket-service
          predicates:
            - Path=/api/ws/**
          filters:
            - StripPrefix=0
        - id: file-service-avatar
          uri: lb://file-relay-service
          predicates:
            - Path=/file/avatar/**
          filters:
            - StripPrefix=0
        - id: file-relay-service
          uri: lb://file-relay-service
          predicates:
            - Path=/file/**
          filters:
            - StripPrefix=0
        - id: voice-service
          uri: lb://voice-service
          predicates:
            - Path=/voice/**
          filters:
            - StripPrefix=0
        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/admin/**
          filters:
            - StripPrefix=0
        - id: chat-service
          uri: lb://chat-service
          predicates:
            - Path=/chat/**
          filters:
            - StripPrefix=0
      # 全局跨域配置
      # 注意：allowCredentials=true 时 origin 不可为 "*"
      # 本地开发使用 Pattern 方式；生产环境建议在 Nacos 配置中覆盖为具体域名
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:*"
              - "https://localhost:*"
              - "http://127.0.0.1:*"
              - "https://127.0.0.1:*"
              - "https://198.18.*.*:*"
              - "http://198.18.*.*:*"
              - "https://192.168.*.*:*"
              - "http://192.168.*.*:*"
              - "https://172.*.*.*:*"
              - "http://172.*.*.*:*"
              - "https://10.*.*.*:*"
              - "http://10.*.*.*:*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

# 禁用 OTel 全局自动配置
# OTel SDK 通过 GatewayOtelConfiguration Bean 手动注册到 GlobalOpenTelemetry。
# 若不禁用，Logback 在 SDK Bean 就绪前触发 GlobalOpenTelemetry.get() 会导致 auto-configure
# 设置 noop，进而阻止 SDK Bean 的 set() 调用，引发 IllegalStateException。
otel.java.global-autoconfigure.enabled: false

# JWT 本地配置（本地开发 fallback，Nacos 优先）
gopair:
  jwt:
    secret: placeholder-for-local-dev-only
    expiration: 86400000

# 服务端口（可通过环境变量 SERVER_PORT 覆盖）
server:
  port: 8081
