# 应用基本配置
spring:
  application:
    # 应用名称，用于服务注册与发现
    name: gateway-service
  profiles:
    # 当前环境配置
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import:
      # 网关专属配置（Nacos服务发现、JWT验证、skipAuthPaths）
      - optional:nacos:gopair-gateway.yml?group=DEFAULT_GROUP&refresh=true
      # 统一日志与可观测性配置
      - optional:nacos:gopair-logging-base.yml?group=DEFAULT_GROUP&refresh=true

  # 网关路由配置
  cloud:
    gateway:
      # 全局 HTTP 客户端超时配置，防止下游卡死导致线程池耗尽
      httpclient:
        connect-timeout: 5000
        response-timeout: 30s
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/user/**
          filters:
            - StripPrefix=0
        - id: room-service
          uri: lb://room-service
          predicates:
            - Path=/room/**
          filters:
            - StripPrefix=0
        - id: message-service
          uri: lb://message-service
          predicates:
            - Path=/message/**
          filters:
            - StripPrefix=0
        - id: websocket-api-service
          uri: lb://websocket-service
          predicates:
            - Path=/api/ws/**
          filters:
            - StripPrefix=0
        - id: file-relay-service
          uri: lb://file-relay-service
          predicates:
            - Path=/file/**
          filters:
            - StripPrefix=0
        - id: voice-service
          uri: lb://voice-service
          predicates:
            - Path=/voice/**
          filters:
            - StripPrefix=0
      # 全局跨域配置
      # 注意：allowCredentials=true 时 origin 不可为 "*"
      # 本地开发使用 Pattern 方式；生产环境建议在 Nacos 配置中覆盖为具体域名
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:*"
              - "https://localhost:*"
              - "http://127.0.0.1:*"
              - "https://127.0.0.1:*"
              - "https://198.18.*.*:*"
              - "http://198.18.*.*:*"
              - "https://192.168.*.*:*"
              - "http://192.168.*.*:*"
              - "https://172.*.*.*:*"
              - "http://172.*.*.*:*"
              - "https://10.*.*.*:*"
              - "http://10.*.*.*:*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

# 服务端口（可通过环境变量 SERVER_PORT 覆盖）
server:
  port: ${SERVER_PORT:8081}
