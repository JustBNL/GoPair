spring:
  application:
    # 应用名称，用于服务注册与发现
    name: gateway-service
  profiles:
    # 当前环境配置
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import:
      - optional:nacos:gopair-gateway.yml?group=DEFAULT_GROUP&refresh=true
      - optional:nacos:gopair-logging-base.yml?group=DEFAULT_GROUP&refresh=true
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/user/**
          filters:     
            - StripPrefix=0
        - id: room-service
          uri: lb://room-service
          predicates:
            - Path=/room/**
          filters:
            - StripPrefix=0
        - id: message-service
          uri: lb://message-service
          predicates:
            - Path=/message/**
          filters:
            - StripPrefix=0
        - id: websocket-api-service
          uri: lb://websocket-service
          predicates:
            - Path=/api/ws/**
          filters:
            - StripPrefix=1
        - id: file-relay-service
          uri: lb://file-relay-service
          predicates:
            - Path=/file/**
          filters:
            - StripPrefix=0
        - id: voice-service
          uri: lb://voice-service
          predicates:
            - Path=/voice/**
          filters:
            - StripPrefix=0
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

# 网关特定配置
gopair:
  gateway:
    skip-auth-paths: "/user/login,/user,/doc.html,/swagger-ui.html,/v3/api-docs"