# 应用基本配置
spring:
  application:
    # 应用名称，匹配网关路由 lb://file-relay-service
    name: file-relay-service
  profiles:
    # 当前环境配置
    active: dev
  config:
    import:
      # 共享基础设施配置（Redis、MySQL、RabbitMQ、MyBatis-Plus、Knife4j）
      - optional:nacos:gopair-shared.yml?group=DEFAULT_GROUP&refresh=true
      # 统一日志与可观测性配置
      - optional:nacos:gopair-logging-base.yml?group=DEFAULT_GROUP&refresh=true

  # 文件上传大小限制（file-service 专属）
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 110MB

# MyBatis-Plus 服务专属配置（通用配置由 gopair-shared.yml 提供）
mybatis-plus:
  type-aliases-package: com.gopair.fileservice.domain.po

# 业务配置（file-service 专属）
gopair:
  security:
    skip-auth-paths: ""

  # MinIO 对象存储配置
  minio:
    endpoint: http://127.0.0.1:9000
    access-key: admin
    secret-key: 12345678
    bucket-name: gopair-files
    # Presigned URL 有效期（秒），默认 24 小时，与房间生命周期一致
    presigned-url-expire-seconds: 86400

  # 文件上传限制
  file:
    # 单文件最大限制（字节），默认 100MB
    max-file-size: 104857600
    # 房间文件总容量限制（字节），默认 1GB
    max-room-size: 1073741824
    # 缩略图尺寸（像素）
    thumbnail-size: 200
    # 允许的文件类型（逗号分隔）
    allowed-types: pdf,doc,docx,xls,xlsx,ppt,pptx,txt,md,json,xml,csv,jpg,jpeg,png,gif,bmp,webp,svg,mp4,avi,mov,mp3,wav,flac,aac,zip,rar,7z,tar,gz
    # 头像文件最大限制（字节），默认 5MB
    avatar-max-size: 5242880
