# 应用基本配置
spring:
  application:
    # 应用名称，匹配网关路�?lb://file-relay-service
    name: file-relay-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import:
      - optional:nacos:gopair-business.yml?group=DEFAULT_GROUP&refresh=true
      - optional:nacos:gopair-logging-base.yml?group=DEFAULT_GROUP&refresh=true

  # Redis配置（可被Nacos覆盖�?
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 0
          max-wait: 2000ms
      timeout: 3000ms

  # 文件上传大小限制
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 110MB

mybatis-plus:
  type-aliases-package: com.gopair.fileservice.domain.po

# GoPair文件服务自定义配�?
gopair:
  security:
    skip-auth-paths: ""
  # MinIO配置
  minio:
    endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
    access-key: ${MINIO_ACCESS_KEY:admin}
    secret-key: ${MINIO_SECRET_KEY:12345678}
    bucket-name: ${MINIO_BUCKET:gopair-files}
    # Presigned URL有效期（秒），默�?4小时，与房间生命周期一�?
    presigned-url-expire-seconds: ${MINIO_PRESIGNED_EXPIRE:86400}

  # 文件上传限制
  file:
    # 单文件最大限制（字节），默认100MB
    max-file-size: ${FILE_MAX_SIZE:104857600}
    # 房间文件总容量限制（字节），默认1GB
    max-room-size: ${FILE_MAX_ROOM_SIZE:1073741824}
    # 缩略图尺寸（像素�?
    thumbnail-size: ${FILE_THUMBNAIL_SIZE:200}
    # 允许的文件类型（逗号分隔�?
    allowed-types: pdf,doc,docx,xls,xlsx,ppt,pptx,txt,md,json,xml,csv,jpg,jpeg,png,gif,bmp,webp,svg,mp4,avi,mov,mp3,wav,flac,aac,zip,rar,7z,tar,gz
