# 测试环境配置
spring:
  application:
    name: file-service-test

  # 允许测试环境下的 Bean 定义覆盖
  main:
    allow-bean-definition-overriding: true

  # 禁用 Nacos 配置中心
  config:
    import: "optional:nacos:"
  cloud:
    nacos:
      config:
        enabled: false
      discovery:
        enabled: false

  # 真实 MySQL 测试数据库
  datasource:
    url: jdbc:mysql://localhost:3306/gopair_test?useSSL=false&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
    username: root
    password: 610692
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # 禁用 SQL 初始化（H2 模式废弃）
  sql:
    init:
      mode: never

  # RabbitMQ 测试配置（禁用避免队列不存在错误）
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        auto-startup: false
    virtual-host: /
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
      - com.gopair.common.config.RabbitMQAutoConfiguration
      - io.minio.MinioAutoConfiguration

  # 真实 Redis 测试配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 14
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

# 服务器配置
server:
  port: 0
  tomcat:
    max-swallow-size: 314572800
  servlet:
    multipart:
      max-file-size: 314572800
      max-request-size: 314572800

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.gopair.fileservice.domain.po
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# 文件服务业务配置
gopair:
  minio:
    endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
    access-key: admin
    secret-key: 12345678
    bucket-name: gopair-files-test
    presigned-url-expire-seconds: 3600
  file:
    max-file-size: 104857600
    max-room-size: 1073741824
    thumbnail-size: 200
    allowed-types: pdf,doc,docx,xls,xlsx,ppt,pptx,txt,md,json,xml,csv,jpg,jpeg,png,gif,bmp,webp,svg,mp4,avi,mov,mp3,wav,flac,aac,zip,rar,7z,tar,gz
    avatar-max-size: 5242880

# 日志配置
logging:
  level:
    com.gopair.fileservice: INFO
    org.springframework.web: INFO
    org.springframework.test: INFO
    org.springframework.transaction: DEBUG
    org.springframework.jdbc: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
