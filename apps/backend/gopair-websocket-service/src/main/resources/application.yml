# 应用基本配置
spring:
  application:
    # 应用名称，用于服务注册与发现
    name: websocket-service
  profiles:
    # 当前环境配置
    active: dev
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
  config:
    import:
      # 共享基础设施配置（Redis、RabbitMQ、MyBatis-Plus、Knife4j）
      # 注意：websocket-service 无 MySQL 驱动，datasource 配置自动忽略
      - optional:nacos:gopair-shared.yml?group=DEFAULT_GROUP&refresh=true
      # 统一日志与可观测性配置
      - optional:nacos:gopair-logging-base.yml?group=DEFAULT_GROUP&refresh=true
  rabbitmq:
    listener:
      simple:
        acknowledge-mode: manual

# 服务端口（可通过环境变量 SERVER_PORT 覆盖）
server:
  port: 8085

# 业务配置（websocket-service 专属）
gopair:
  websocket:
    # 最大连接数
    max-connections: 10000
    # 连接超时时间（秒）
    connection-timeout: 60
    # 心跳间隔（秒）
    heartbeat-interval: 30
    # RabbitMQ Topic Exchange 名称
    exchange-name: "websocket.topic"
    # Session 在 Redis 中的 TTL（秒）
    session-ttl: 3600
  # RabbitMQ 队列参数配置（TTL 单位：毫秒，max-length 单位：条）
  mq:
    websocket-chat-ttl: 300000
    websocket-chat-max-length: 100000
    websocket-signaling-ttl: 60000
    websocket-signaling-max-length: 50000
    websocket-file-ttl: 600000
    websocket-file-max-length: 10000
    websocket-system-ttl: 300000
    websocket-system-max-length: 20000
    websocket-offline-ttl: 300000
    websocket-offline-max-length: 50000
