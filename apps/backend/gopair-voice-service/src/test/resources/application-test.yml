# 测试环境配置
spring:
  application:
    name: voice-service-test

  # 允许测试环境下的 Bean 定义覆盖
  main:
    allow-bean-definition-overriding: true

  # 禁用 Nacos 配置中心
  config:
    import: "optional:nacos:"

  cloud:
    nacos:
      config:
        enabled: false
      discovery:
        enabled: false

  # H2 内存数据库
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # H2 初始化脚本
  sql:
    init:
      mode: embedded
      schema-locations: classpath:schema.sql

  # RabbitMQ 测试配置（禁用避免队列不存在错误）
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        auto-startup: false
    virtual-host: /
  autoconfigure:
    exclude:
      - com.gopair.common.config.RabbitMQAutoConfiguration

  # Redis 测试配置
  data:
    redis:
      host: localhost
      port: 6379

# 服务器配置
server:
  port: 0

# MyBatis-Plus 配置
mybatis-plus:
  type-aliases-package: com.gopair.voiceservice.domain.po
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# 业务配置
gopair:
  security:
    skip-auth-paths: ""
  mq:
    voice-room-created-ttl: 300000

# 日志配置
logging:
  level:
    com.gopair.voiceservice: DEBUG
    org.springframework.web: INFO
    org.springframework.test: INFO
    org.h2: INFO
    org.mybatis: INFO
