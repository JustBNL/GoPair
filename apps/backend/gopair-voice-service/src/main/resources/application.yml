# 应用基本配置
spring:
  application:
    # 应用名称，用于服务注册与发现
    name: voice-service
  profiles:
    # 当前环境配置
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import:
      # 共享基础设施配置（Redis、MySQL、RabbitMQ、MyBatis-Plus、Knife4j）
      - optional:nacos:gopair-shared.yml?group=DEFAULT_GROUP&refresh=true
      # 统一日志与可观测性配置
      - optional:nacos:gopair-logging-base.yml?group=DEFAULT_GROUP&refresh=true

# 服务端口（可通过环境变量 SERVER_PORT 覆盖）
server:
  port: ${SERVER_PORT:8086}

# MyBatis-Plus 服务专属配置（通用配置由 gopair-shared.yml 提供）
mybatis-plus:
  type-aliases-package: com.gopair.voiceservice.domain.po

# 业务配置（voice-service 专属）
gopair:
  security:
    # 白名单路径，暂无需跳过鉴权的路由
    skip-auth-paths: ""
