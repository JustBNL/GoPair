spring.application.name=backend
# \u8BBE\u7F6E\u670D\u52A1\u5668\u7AEF\u53E3\u53F7
server.port=8080

# --- MySQL \u6570\u636E\u6E90\u914D\u7F6E ---
# \u786E\u4FDD gopair \u6570\u636E\u5E93\u5DF2\u5728 MySQL \u4E2D\u521B\u5EFA
spring.datasource.url=jdbc:mysql://localhost:3306/gopair?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
# \u60A8\u7684 MySQL \u7528\u6237\u540D (\u901A\u5E38\u662F root)
spring.datasource.username=root
# \u60A8\u7684 MySQL \u5BC6\u7801 (!!!\u8BF7\u66FF\u6362\u6210\u60A8\u81EA\u5DF1\u7684\u5BC6\u7801!!!)
spring.datasource.password=610692

# --- JPA (Hibernate) \u914D\u7F6E ---
# ddl-auto=update: \u5F00\u53D1\u65F6\u7684\u795E\u5668\uFF0C\u5B83\u4F1A\u6839\u636E\u60A8\u7684 Java \u5B9E\u4F53\u7C7B\u81EA\u52A8\u5728\u6570\u636E\u5E93\u4E2D\u521B\u5EFA\u6216\u66F4\u65B0\u8868\u7ED3\u6784\u3002
spring.jpa.hibernate.ddl-auto=update
# show-sql=true: \u5728\u63A7\u5236\u53F0\u6253\u5370\u51FA Hibernate \u6267\u884C\u7684 SQL \u8BED\u53E5\uFF0C\u65B9\u4FBF\u8C03\u8BD5\u3002
spring.jpa.show-sql=true

# ===================================================================
# \u65E5\u5FD7\u7EA7\u522B\u914D\u7F6E (Logging Level Configuration)
# ===================================================================

# \u5C06 Spring Web \u76F8\u5173\u7684\u6240\u6709\u65E5\u5FD7\u7EA7\u522B\u8BBE\u7F6E\u4E3A DEBUG
# \u8FD9\u4F1A\u6253\u5370\u51FA\u8BF7\u6C42\u7684\u5206\u53D1\u3001\u53C2\u6570\u7ED1\u5B9A\u7B49\u8BE6\u7EC6\u4FE1\u606F
logging.level.org.springframework.web=DEBUG

# (\u53EF\u9009) \u5C06\u60A8\u81EA\u5DF1\u5199\u7684\u4EE3\u7801\u7684\u65E5\u5FD7\u7EA7\u522B\u4E5F\u8BBE\u7F6E\u4E3A DEBUG
# logging.level.com.gopair.backend=DEBUG