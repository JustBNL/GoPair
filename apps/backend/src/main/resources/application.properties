spring.application.name=backend
# \u8BBE\u7F6E\u670D\u52A1\u5668\u7AEF\u53E3\u53F7
server.port=8080

# ===================================================================
# --- 数据源配置 ---
# ===================================================================
# 数据库连接URL (使用P6Spy代理)
spring.datasource.url=jdbc:p6spy:mysql://localhost:3306/gopair?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
spring.datasource.driver-class-name=com.p6spy.engine.spy.P6SpyDriver
# 数据库用户名和密码
spring.datasource.username=root
spring.datasource.password=610692

# ===================================================================
# --- MyBatis-Plus 配置 ---
# ===================================================================
# 实体类别名扫描包
mybatis-plus.type-aliases-package=com.gopair.backend.entity
# Mapper XML 文件位置
mybatis-plus.mapper-locations=classpath:mapper/*.xml

# --- MyBatis 配置属性 ---
# 注意: 删除了config-location配置，避免与下面的configuration配置冲突
# 开启下划线转驼峰命名
mybatis-plus.configuration.map-underscore-to-camel-case=true
# 启用缓存功能
mybatis-plus.configuration.cache-enabled=true
# 使用JDBC的getGeneratedKeys获取自增主键值
mybatis-plus.configuration.use-generated-keys=true
# 自动映射行为 (FULL表示自动映射任意复杂的结果集)
mybatis-plus.configuration.auto-mapping-behavior=full
# SQL日志由P6Spy处理，此配置可注释掉
# mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# ===================================================================
# --- JWT 配置 ---
# ===================================================================
# JWT 密钥
gopair.jwt.secret=a-very-long-and-secure-secret-key-for-gopair-project-xyz
# JWT 过期时间 (24小时，单位：毫秒)
gopair.jwt.expiration=86400000

# ===================================================================
# --- Knife4j 配置 ---
# ===================================================================
# 启用增强配置
knife4j.enable=true
# 开启生产环境屏蔽
knife4j.production=false
# 启用Swagger UI
springdoc.swagger-ui.enabled=true
# 设置Swagger UI路径
springdoc.swagger-ui.path=/swagger-ui.html
# 设置API文档路径
springdoc.api-docs.path=/v3/api-docs
# 设置分组文档是否可用
springdoc.group-configs[0].group=default
springdoc.group-configs[0].paths-to-match=/**
springdoc.group-configs[0].packages-to-scan=com.gopair.backend.controller

# ===================================================================
# \u65E5\u5FD7\u7EA7\u522B\u914D\u7F6E (Logging Level Configuration)
# ===================================================================

# \u5C06 Spring Web \u76F8\u5173\u7684\u6240\u6709\u65E5\u5FD7\u7EA7\u522B\u8BBE\u7F6E\u4E3A DEBUG
# \u8FD9\u4F1A\u6253\u5370\u51FA\u8BF7\u6C42\u7684\u5206\u53D1\u3001\u53C2\u6570\u7ED1\u5B9A\u7B49\u8BE6\u7EC6\u4FE1\u606F
logging.level.org.springframework.web=DEBUG

# (\u53EF\u9009) \u5C06\u60A8\u81EA\u5DF1\u5199\u7684\u4EE3\u7801\u7684\u65E5\u5FD7\u7EA7\u522B\u4E5F\u8BBE\u7F6E\u4E3A DEBUG
# logging.level.com.gopair.backend=DEBUG