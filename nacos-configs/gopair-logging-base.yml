# 统一日志配置
logging:
  # 日志格式配置
  pattern:
    # 控制台日志格式：包含traceId、spanId、userId、nickname
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [traceId=%X{traceId:-},spanId=%X{spanId:-}] [userId=%X{userId:-},nickname=%X{nickname:-}] %-40.40logger{39} : %m%n"
    # 文件日志格式（如果需要）
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [traceId=%X{traceId:-},spanId=%X{spanId:-}] [userId=%X{userId:-},nickname=%X{nickname:-}] %-40.40logger{39} : %m%n"

  # 统一日志级别配置
  level:
    # 设置根日志级别
    root: INFO
    # GoPair相关包的日志级别
    com.gopair: DEBUG
    # Spring相关日志级别
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.springframework.cloud: INFO
    org.springframework.cloud.gateway: INFO
    # 数据库相关日志
    org.springframework.jdbc: INFO
    com.baomidou.mybatisplus: INFO
    com.zaxxer.hikari: INFO
    # SQL日志级别（如果使用MyBatis）
    com.gopair.*.mapper: DEBUG
    # WebSocket调试
    org.springframework.web.socket: INFO
    # HTTP请求日志
    org.springframework.web.servlet.DispatcherServlet: INFO
    # 第三方组件日志级别
    redis.clients.jedis: INFO
    com.alibaba.nacos.client: INFO
    # 网关特定日志
    org.springframework.cloud.loadbalancer: INFO
    reactor.netty: WARN

  # 可选的文件配置
  file:
    name: ./logs/${spring.application.name}.log
    max-size: 100MB
    max-history: 30
    total-size-cap: 1GB

# Spring Boot Actuator基础配置
management:
  # 端点配置
  endpoints:
    web:
      exposure:
        # 基础监控端点
        include: health,metrics,info,tracing
  endpoint:
    health:
      show-details: when-authorized

  # 链路追踪配置
  tracing:
    # 采样配置
    sampling:
      # 采样概率：1.0表示100%采样，生产环境建议0.1
      probability: 1.0
    # Baggage配置（用于在span之间传播自定义数据）
    baggage:
      remote-fields: userId,nickname
      # correlation-fields 使 Brave 自动将 Baggage 同步到 MDC
      # 与 TracingMdcConfiguration 的 MDCScopeDecorator 协同工作
      correlation-fields: userId,nickname

  # OTLP配置 (OpenTelemetry Protocol)
  otlp:
    tracing:
      endpoint: http://localhost:5081
    logging:
      endpoint: http://localhost:5081
      compression: gzip

  # 启用 OTLP 日志导出（设为 none 则关闭，仅输出到控制台或文件）
  observability:
    logging:
      exporter: otlp

  # Prometheus指标配置
  metrics:
    export:
      prometheus:
        enabled: true

# ============================================================
# GoPair 业务框架配置（从 gopair-business.yml 迁入）
# ============================================================

gopair:
  # AOP 日志配置
  logging:
    # 日志功能总开关
    enabled: true

    # AOP 方法日志配置
    aop:
      enabled: true
      logArgs: true
      logResult: true
      logExecutionTime: true

    # 运维日志配置
    ops:
      enabled: false
      mvcEnabled: false
      actuatorEnabled: false
      healthEnabled: false
      metricsEnabled: false

  # 用户上下文配置
  context:
    # 上下文功能总开关
    enabled: true
    user:
      excludedPaths:
        - /health
        - /actuator/**
        - /error
        - /favicon.ico
        - /static/**
        - /webjars/**
        - /user/login
        - /user/register

  # OpenTelemetry 日志导出配置（OTLP → OpenObserve）
  otel:
    # OpenObserve Basic Auth Base64 凭证
    # 生成方式: Base64(账号:密码)，账号=811790017@qq.com，密码=811790017
    authorization: Basic ODExNzkwMDE3QHFxLmNvbTo4MTE3OTAwMTc=
    # OpenObserve 组织名称
    organization: default
    # OpenObserve 日志 Stream 名称（各服务可通过 application.yml 覆盖为自身的 spring.application.name）
    stream-name: ${spring.application.name:-gopair-service}
