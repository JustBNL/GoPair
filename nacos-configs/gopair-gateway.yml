# ============================================================
# GoPair 网关专属配置
# 适用范围：仅 gateway-service
# ============================================================

# Nacos 连接和服务发现配置
spring:
  cloud:
    nacos:
      # Nacos 服务地址
      server-addr: 127.0.0.1:8848
      # 配置中心
      config:
        file-extension: yml
        group: DEFAULT_GROUP
        namespace: ''
      # 服务发现
      discovery:
        enabled: true
        register-enabled: true
        heart-beat-interval: 5
        heart-beat-timeout: 15
        ip-delete-timeout: 30
        group: DEFAULT_GROUP
        namespace: ''
        metadata:
          version: ${app.version:1.0.0}
          zone: ${app.zone:default}
          management.context-path: ${server.servlet.context-path:}/actuator
        watch:
          enabled: true
        instance-enabled: true
        ephemeral: true

    # Spring Cloud LoadBalancer 配置
    loadbalancer:
      configurations: default
      health-check:
        initial-delay: 0
      retry:
        enabled: true

# 网关 Actuator + OTLP 可观测性配置
management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus,gateway"
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true
  otlp:
    tracing:
      endpoint: http://localhost:5081
    logging:
      endpoint: http://localhost:5081
      compression: gzip
  observability:
    logging:
      exporter: otlp

# JWT 验证配置（网关层面，仅用于验证令牌）
gopair:
  jwt:
    # JWT 密钥，与 user-service 保持一致（通过环境变量统一注入）
    secret: hZ3UDLoIEAiyUChiKDNVaMrXK65vrKY+e/MxxDeu3wdjQgsBsl6/fsPr/kR/fbs0W8/3AGbt515cqMXs/AkdDw==
    # JWT 过期时间（毫秒），必须为正数，与 user-service 保持一致
    expiration: 86400000

  # 网关认证白名单（kebab-case，统一命名规范）
  gateway:
    # 说明：支持精确匹配及尾部斜杠变体（如 /ws 可匹配 /ws 和 /ws/）
    # /user/{userId} 等 Ant 风格需网关过滤器扩展支持
    # /actuator/health 用于负载均衡探活
    skip-auth-paths: /user/login,/user/register,/user/sendCode,/user/forgotPassword,/user/page,/user/by-ids,/user/{userId},/favicon.ico,/error,/actuator/health,/doc.html,/swagger-ui.html,/v3/api-docs
    # CORS 跨域来源配置（多个用逗号分隔，支持 * 通配符）
    # 本地开发：https://localhost:*,http://localhost:*
    # 移动端/局域网：https://192.168.x.x:*
    # 生产环境：https://your-domain.com
    # 可通过 CORS_ALLOWED_ORIGINS 环境变量覆盖
    allowed-origins: http://localhost:*,https://localhost:*,http://127.0.0.1:*,https://127.0.0.1:*

# ============================================================
# Spring Cloud Gateway OpenTelemetry 可观测性配置
# 适用于 WebFlux 响应式架构，通过 Spring Boot OTel Auto-configuration 导出日志和链路
# ============================================================
