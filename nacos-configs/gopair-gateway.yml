# GoPair网关专用配置
# Data ID: gopair-gateway.yml
# Group: DEFAULT_GROUP
# 说明: 网关服务专用配置，基于WebFlux架构，不包含AOP和数据库相关配置

# Nacos连接和服务发现配置
spring:
  cloud:
    nacos:
      # Nacos服务地址
      server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      # 配置中心
      config:
        file-extension: yml
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        namespace: ${NACOS_NAMESPACE:}
      # 服务发现
      discovery:
        enabled: true
        register-enabled: true
        heart-beat-interval: 5
        heart-beat-timeout: 15
        ip-delete-timeout: 30
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        namespace: ${NACOS_NAMESPACE:}
        metadata:
          version: ${app.version:1.0.0}
          zone: ${app.zone:default}
          management.context-path: ${server.servlet.context-path:}/actuator
        watch:
          enabled: true
        instance-enabled: true
        ephemeral: true
    
    # Spring Cloud LoadBalancer配置
    loadbalancer:
      configurations: default
      health-check:
        initial-delay: 0
      retry:
        enabled: true

# 网关固定端口配置
server:
  port: 8081

# 网关特定Actuator配置（不包含链路追踪端点）
management:
  endpoints:
    web:
      exposure:
        # 网关专用监控端点，包含gateway端点
        include: "health,info,metrics,prometheus,gateway"
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

# JWT验证配置（网关层面，仅验证功能，无过期时间）
gopair:
  jwt:
    # JWT密钥，用于验证令牌
    secret: ${JWT_SECRET:hZ3UDLoIEAiyUChiKDNVaMrXK65vrKY+e/MxxDeu3wdjQgsBsl6/fsPr/kR/fbs0W8/3AGbt515cqMXs/AkdDw==}
  
  # 网关认证配置
  gateway:
    skipAuthPaths: ${GATEWAY_SKIP_AUTH_PATHS:/user/login,/user,/doc.html,/swagger-ui.html,/v3/api-docs} 