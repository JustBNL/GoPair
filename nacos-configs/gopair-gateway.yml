# GoPair网关服务配置 - 在Nacos配置中心创建
# Data ID: gopair-gateway.yml
# Group: DEFAULT_GROUP

# JWT验证配置（网关层面）
gopair:
  jwt:
    # JWT密钥，用于验证令牌（环境变量优先）
    secret: ${JWT_SECRET:hZ3UDLoIEAiyUChiKDNVaMrXK65vrKY+e/MxxDeu3wdjQgsBsl6/fsPr/kR/fbs0W8/3AGbt515cqMXs/AkdDw==}

# 服务发现和负载均衡配置（网关专用）
spring:
  cloud:
    nacos:
      discovery:
        # 是否启用服务发现
        enabled: true
        # 是否注册到Nacos
        register-enabled: true
        # 心跳间隔（秒）
        heart-beat-interval: 5
        # 心跳超时时间（秒）
        heart-beat-timeout: 15
        # 实例IP注册优先级
        ip-delete-timeout: 30
        # 服务实例元数据
        metadata:
          version: ${app.version:1.0.0}
          zone: ${app.zone:default}
          management.context-path: ${server.servlet.context-path:}/actuator
        # 是否开启Nacos Watch
        watch:
          enabled: true
        # 实例是否健康，不健康的实例不会被路由到
        instance-enabled: true
        # 是否为临时实例
        ephemeral: true
    # Spring Cloud LoadBalancer配置（替代Ribbon）
    loadbalancer:
      # 负载均衡策略
      configurations: default
      # 健康检查
      health-check:
        initial-delay: 0
      # 重试配置
      retry:
        enabled: true

# Feign客户端配置
feign:
  # 客户端配置
  client:
    config:
      default:
        # 连接超时时间
        connectTimeout: 5000
        # 读取超时时间
        readTimeout: 10000
        # 日志级别
        loggerLevel: basic

# 网关应用特定日志配置
logging:
  level:
    com.gopair.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG 