# ============================================================
# GoPair 网关专属配置
# 适用范围：仅 gateway-service
# ============================================================

# Nacos 连接和服务发现配置
spring:
  cloud:
    nacos:
      # Nacos 服务地址
      server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      # 配置中心
      config:
        file-extension: yml
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        namespace: ${NACOS_NAMESPACE:}
      # 服务发现
      discovery:
        enabled: true
        register-enabled: true
        heart-beat-interval: 5
        heart-beat-timeout: 15
        ip-delete-timeout: 30
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        namespace: ${NACOS_NAMESPACE:}
        metadata:
          version: ${app.version:1.0.0}
          zone: ${app.zone:default}
          management.context-path: ${server.servlet.context-path:}/actuator
        watch:
          enabled: true
        instance-enabled: true
        ephemeral: true

    # Spring Cloud LoadBalancer 配置
    loadbalancer:
      configurations: default
      health-check:
        initial-delay: 0
      retry:
        enabled: true

# 网关专属 Actuator 配置（含 gateway 端点）
management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus,gateway"
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

# JWT 验证配置（网关层面，仅用于验证令牌）
gopair:
  jwt:
    # JWT 密钥，与 user-service 保持一致（通过环境变量统一注入）
    secret: ${JWT_SECRET:hZ3UDLoIEAiyUChiKDNVaMrXK65vrKY+e/MxxDeu3wdjQgsBsl6/fsPr/kR/fbs0W8/3AGbt515cqMXs/AkdDw==}

  # 网关认证白名单（kebab-case，统一命名规范）
  gateway:
    skip-auth-paths: ${GATEWAY_SKIP_AUTH_PATHS:/user/login,/user,/user/sendCode,/user/forgotPassword,/doc.html,/swagger-ui.html,/v3/api-docs}
