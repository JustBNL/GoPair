# GoPair业务服务专用配置
# Data ID: gopair-business.yml
# Group: DEFAULT_GROUP
# 说明: 业务服务专用配置，包含数据库、AOP日志、用户上下文、API文档等业务功能

# Nacos连接和服务发现配置
spring:
  cloud:
    nacos:
      # Nacos服务地址
      server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      # 配置中心
      config:
        file-extension: yml
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        namespace: ${NACOS_NAMESPACE:}
      # 服务发现
      discovery:
        enabled: true
        register-enabled: true
        heart-beat-interval: 5
        heart-beat-timeout: 15
        ip-delete-timeout: 30
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        namespace: ${NACOS_NAMESPACE:}
        metadata:
          version: ${app.version:1.0.0}
          zone: ${app.zone:default}
          management.context-path: ${server.servlet.context-path:}/actuator
        watch:
          enabled: true
        instance-enabled: true
        ephemeral: true

  # 数据库配置
  datasource:
    # MySQL数据库连接URL，支持环境变量覆盖
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:gopair}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:610692}
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 数据库连接池配置
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT:600000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME:1800000}
      connection-test-query: SELECT 1

# 业务服务动态端口配置
server:
  # 动态端口分配以支持水平扩展
  port: 0

# MyBatis Plus通用配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto

# Knife4j API文档配置
knife4j:
  # 全局开关
  enable: ${KNIFE4J_ENABLE:true}
  # 是否为生产环境，支持环境变量覆盖
  production: ${KNIFE4J_PRODUCTION:false}
  # 基础UI设置
  setting:
    # UI界面的显示语言
    language: zh-CN
    # 是否在页面底部显示Models模块
    enable-swagger-models: true
    # 是否开启页面顶部的搜索框
    enable-search: true


# GoPair业务服务AOP日志配置
gopair:
  logging:
    # 日志功能总开关
    enabled: ${GOPAIR_LOGGING_ENABLED:true}
    
    # AOP日志配置（匹配LoggingProperties.Aop类）
    aop:
      enabled: ${AOP_LOGGING_ENABLED:true}
      logArgs: ${BUSINESS_LOG_RECORD_PARAMS:true}
      logResult: ${BUSINESS_LOG_RECORD_RESULT:true}
      logExecutionTime: ${PERFORMANCE_LOG_ENABLED:true}
    
    # 运维日志配置（匹配LoggingProperties.Ops类）
    ops:
      enabled: ${LOGGING_OPS_ENABLED:false}
      mvcEnabled: ${LOGGING_MVC_ENABLED:false}
      actuatorEnabled: ${LOGGING_ACTUATOR_ENABLED:false}
      healthEnabled: ${LOGGING_HEALTH_ENABLED:false}
      metricsEnabled: ${LOGGING_METRICS_ENABLED:false}

  # 用户上下文配置
  context:
    # 上下文功能总开关
    enabled: ${GOPAIR_CONTEXT_ENABLED:true}
    
    # 用户上下文配置
    user:
      excludedPaths:
        - /health
        - /actuator/**
        - /error
        - /favicon.ico
        - /static/**
        - /webjars/**
        - /user/login
        - /user/register